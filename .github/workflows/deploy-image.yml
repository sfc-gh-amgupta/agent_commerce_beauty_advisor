name: Deploy Docker Image to Snowflake Registry

on:
  workflow_dispatch:
    inputs:
      snowflake_account:
        description: 'Snowflake account identifier (e.g., ORGNAME-ACCOUNTNAME)'
        required: true
        type: string
      snowflake_user:
        description: 'Snowflake username with ACCOUNTADMIN'
        required: true
        type: string
      snowflake_password:
        description: 'Snowflake password'
        required: true
        type: string

env:
  IMAGE_NAME: agent-commerce-backend
  IMAGE_TAG: latest
  REPO_PATH: agent_commerce/util/agent_commerce_repo

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute Snowflake Registry URL
        id: registry
        run: |
          ACCOUNT=$(echo "${{ inputs.snowflake_account || secrets.SNOWFLAKE_ACCOUNT }}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')
          REGISTRY="${ACCOUNT}.registry.snowflakecomputing.com"
          echo "url=${REGISTRY}" >> $GITHUB_OUTPUT

      - name: Login to Snowflake Registry
        run: |
          echo "${{ inputs.snowflake_password || secrets.SNOWFLAKE_PASSWORD }}" | docker login "${{ steps.registry.outputs.url }}" \
            -u "${{ inputs.snowflake_user || secrets.SNOWFLAKE_USER }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build --platform linux/amd64 \
            -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            ./backend

      - name: Tag image for Snowflake
        run: |
          docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            ${{ steps.registry.outputs.url }}/${{ env.REPO_PATH }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Push to Snowflake Registry
        run: |
          docker push ${{ steps.registry.outputs.url }}/${{ env.REPO_PATH }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Summary
        run: |
          echo "### Image Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** ${{ steps.registry.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.REPO_PATH }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Next: Continue running **Part B** of \`deploy.sql\` in Snowsight" >> $GITHUB_STEP_SUMMARY
